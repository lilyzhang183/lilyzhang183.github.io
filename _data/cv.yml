- title: Research / Directed Reading
  type: time_table
  contents:
    - title: Master's Thesis
      institution: Washington University in St. Louis
      year: "May 2025--Present"
      description:
        - "Reading literature on Lie groupoids and Riemannian Lie groupoids with the aim of understanding Molino’s Structure Theorem for Riemannian foliations and exploring potential extensions."
        - "Developing preliminary notes translating the frame-bundle lift and basic foliation picture into Lie groupoid terms; assessing scope for possible generalizations."
    - title: Directed Reading — Supporting Master's Thesis
      institution: Washington University in St. Louis
      year: "May 2025--Sep 2025"
      description:
        - "Completed a directed reading on orientations, manifold integration, de Rham cohomology, distributions/foliations, and quotient manifolds using J. M. Lee’s \\textit{Introduction to Smooth Manifolds}—material beyond the Topology II (Differential Topology) syllabus that supplies the analytic toolkit for foliation theory."
        - "Reading Moerdijk \\& Mr\\v{c}un’s \\textit{Introduction to Foliations and Lie Groupoids} to understand (i) Molino’s theory for Riemannian foliations and (ii) the Lie groupoid description of holonomy and transverse geometry."
    - title: Independent Study — K-Theory
      institution: Washington University in St. Louis
      year: "Sep 2025--Present"
      description:
        - "Studying M. F. Atiyah's \\textit{K-Theory}: vector bundles and the construction of $K^0$; reduced $K$ and long exact sequences; Bott periodicity; Thom isomorphism; computations on spheres, $\\mathbb{CP}^n$, and Grassmannians; $\\lambda$-operations and Adams operations; introduction to equivariant $K$-theory."
        - "Exploring $K$-theory in noncommutative geometry (tentative)."
    - title: Directed Reading Program — Kasparov's KK-Theory
      institution: Washington University in St. Louis
      year: "Sep 2025--Present"
      description:
        - "Studying Kasparov's $KK$-theory using B. Blackadar's \\textit{K-Theory for Operator Algebras}: basic theory, intersection product, further structure in $KK$-theory, and equivariant $KK$-theory."

